# Alembic 配置（「热读」内容引擎）
# 用法（任一目录均可）：
#   alembic -c content_engine/alembic.ini upgrade head
#   alembic -c content_engine/alembic.ini revision --autogenerate -m "msg"
#
# DATABASE_URL 由 env.py 从环境变量动态注入，本文件留空即可。

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s/..
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
