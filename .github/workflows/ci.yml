name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint + Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install deps (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          # 安装运行时依赖 + dev extra（pytest / ruff / httpx）
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check content_engine

      - name: Pytest
        run: |
          pytest content_engine/tests -q

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: lint-test
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 仅做镜像可构建性冒烟，不推送到 registry。
      # 后续接 ACR/GHCR 时再加 docker/login-action + push: true。
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: redu/content-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ios-build:
    name: iOS build (Xcode)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 用 latest-stable 而非硬 pin 某个 Xcode.app：保证选中的 Xcode 与 runner
      # 已装的 simulator runtime 匹配，避免 actool「No simulator runtime version
      # available」错配（硬 pin Xcode 16.0 的 SDK18.0 无对应 runtime 会编译失败）。
      - name: Setup Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      # 用通用 iOS 模拟器目标编译，不指定具体机型，避免 runner 镜像机型差异导致失败。
      # CODE_SIGNING_ALLOWED=NO：CI 无证书，只验证可编译，不做签名。
      - name: Build (iOS Simulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project ReDu.xcodeproj \
            -scheme ReDu \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      # 单元测试需要具体模拟器（generic 目标无法跑测试）。机型名随 Xcode 版本漂移，
      # 故动态挑一台可用的 iPhone 模拟器，避免硬编码机型在 runner 上不存在而失败。
      - name: Pick simulator
        id: sim
        run: |
          set -o pipefail
          UDID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; ids=[x["udid"] for r in d.values() for x in r if x.get("isAvailable") and "iPhone" in x["name"]]; print(ids[0] if ids else "")')
          if [ -z "$UDID" ]; then echo 'No available iPhone simulator'; exit 1; fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Test (iOS Simulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project ReDu.xcodeproj \
            -scheme ReDu \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            test
