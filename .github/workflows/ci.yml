name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint + Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install deps (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          # 安装运行时依赖 + dev extra（pytest / ruff / httpx）
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check content_engine

      - name: Pytest (41 cases)
        run: |
          pytest content_engine/tests -q

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: lint-test
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 仅做镜像可构建性冒烟，不推送到 registry。
      # 后续接 ACR/GHCR 时再加 docker/login-action + push: true。
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: redu/content-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
